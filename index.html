<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optic | Personal Finance Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="container">

    <!-- HEADER -->
    <header>
      <div class="logo">
        <span class="logo-icon">◈</span>
        <div>
          <h2>Optic Finance</h2>
          <p>Track your wealth growth</p>
        </div>
      </div>
    </header>

    <!-- BALANCE CARD -->
    <div class="balance-card glass">
      <span class="card-label">TOTAL BALANCE</span>
      <h1 id="balance">$0.00</h1>
      <div class="stats-row">
        <div class="stat">
          <span class="stat-icon income-icon">↑</span>
          <div>
            <span class="stat-label">Income</span>
            <p id="money-plus" class="money plus">+$0.00</p>
          </div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <span class="stat-icon expense-icon">↓</span>
          <div>
            <span class="stat-label">Expenses</span>
            <p id="money-minus" class="money minus">-$0.00</p>
          </div>
        </div>
      </div>
    </div>

    <!-- BUDGET GOALS -->
    <div class="section-header">
      <h3>Budget Goals</h3>
      <button class="ghost-btn" id="toggleBudgetForm">+ Set Goal</button>
    </div>

    <div id="budgetFormWrap" class="glass form-card hidden">
      <div class="form-row">
        <select id="budgetCategory">
          <option value="">Select Category</option>
          <option value="Food">🍔 Food</option>
          <option value="Transport">🚗 Transport</option>
          <option value="Shopping">🛍️ Shopping</option>
          <option value="Health">💊 Health</option>
          <option value="Entertainment">🎮 Entertainment</option>
          <option value="Bills">📄 Bills</option>
          <option value="Other">📦 Other</option>
        </select>
        <input type="number" id="budgetLimit" placeholder="Monthly limit ($)" />
        <button class="btn-sm" id="addBudgetBtn">Save</button>
      </div>
    </div>

    <div id="budgetList" class="budget-list"></div>

    <!-- CHART -->
    <div class="chart-card glass">
      <canvas id="expenseChart"></canvas>
    </div>

    <!-- HISTORY -->
    <div class="section-header">
      <h3>History</h3>
      <select id="filterCategory" class="filter-select">
        <option value="All">All Categories</option>
        <option value="Food">🍔 Food</option>
        <option value="Transport">🚗 Transport</option>
        <option value="Shopping">🛍️ Shopping</option>
        <option value="Health">💊 Health</option>
        <option value="Entertainment">🎮 Entertainment</option>
        <option value="Bills">📄 Bills</option>
        <option value="Salary">💼 Salary</option>
        <option value="Other">📦 Other</option>
      </select>
    </div>
    <ul id="list" class="list"></ul>

    <!-- ADD TRANSACTION -->
    <div class="section-header"><h3>Add Transaction</h3></div>
    <div class="glass form-card">
      <form id="form">
        <div class="form-row">
          <input type="text" id="text" placeholder="Description" required />
        </div>
        <div class="form-row two-col">
          <input type="number" id="amount" placeholder="Amount (- for expense)" required />
          <select id="category">
            <option value="Food">🍔 Food</option>
            <option value="Transport">🚗 Transport</option>
            <option value="Shopping">🛍️ Shopping</option>
            <option value="Health">💊 Health</option>
            <option value="Entertainment">🎮 Entertainment</option>
            <option value="Bills">📄 Bills</option>
            <option value="Salary">💼 Salary</option>
            <option value="Other">📦 Other</option>
          </select>
        </div>
        <button class="btn" type="submit">Add to Ledger</button>
      </form>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="script.js"></script>
</body>
</html>
